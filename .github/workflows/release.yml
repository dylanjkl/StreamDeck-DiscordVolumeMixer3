name: Build & Release Plugin

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Qt 6.8.1 (MinGW), MinGW 13.1, and Ninja
        shell: pwsh
        run: |
          pip install aqtinstall
          python -m aqt install-qt windows desktop 6.8.1 win64_mingw -m qtwebsockets --outputdir "$env:RUNNER_TEMP\Qt"
          python -m aqt install-tool windows desktop tools_mingw1310 --outputdir "$env:RUNNER_TEMP\Qt"
          python -m aqt install-tool windows desktop tools_ninja --outputdir "$env:RUNNER_TEMP\Qt"

      - name: Configure, build, and install (windeployqt)
        shell: pwsh
        run: |
          $qt = "$env:RUNNER_TEMP\Qt\6.8.1\mingw_64"
          $mingwBin = "$env:RUNNER_TEMP\Qt\Tools\mingw1310_64\bin"
          $ninjaDir = "$env:RUNNER_TEMP\Qt\Tools\Ninja"
          $env:PATH = "$mingwBin;$qt\bin;$ninjaDir;$env:PATH"
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release `
            -D CMAKE_PREFIX_PATH="$qt" `
            -D CMAKE_CXX_COMPILER="$mingwBin\g++.exe" `
            -D CMAKE_MAKE_PROGRAM="$ninjaDir\ninja.exe"
          cmake --build build --parallel
          cmake --install build

      - name: Package .streamDeckPlugin (Elgato CLI, validates)
        shell: pwsh
        run: |
          npm install -g @elgato/cli
          $sd = Join-Path (npm prefix -g) "streamdeck.cmd"
          New-Item -ItemType Directory -Force dist-pack | Out-Null
          $plugin = (Get-ChildItem bin\Release -Directory -Filter *.sdPlugin | Select-Object -First 1).FullName
          Write-Host "Packing $plugin"
          & $sd pack -o dist-pack --force "$plugin"
          Get-ChildItem dist-pack

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: streamDeckPlugin
          path: dist-pack/*.streamDeckPlugin
          if-no-files-found: error

      - name: Attach to GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist-pack/*.streamDeckPlugin
          generate_release_notes: true
          fail_on_unmatched_files: true
